# 2Do Better — Docker Compose
#
# First-time setup:
#   1. docker compose build
#   2. docker compose up -d
#   3. docker exec -it 2dobetter node scripts/setup.js   ← runs the setup wizard
#   4. docker compose restart                            ← picks up .env.local created by wizard
#   5. Open https://localhost:3000
#
# Updates:
#   git pull && docker compose up -d --build

services:
  app:
    build: .
    container_name: 2dobetter
    # host networking: container shares the host's network stack directly.
    # This means server.js sees the real LAN IPs (not Docker bridge IPs),
    # so setup-page QR codes and tap-button URLs point to the right address.
    # `ports:` is not compatible with network_mode: host — host ports are used directly.
    network_mode: host
    volumes:
      # These directories live on the HOST machine — not inside the container.
      # Rebuilding or deleting the container will NOT delete your data.
      - ./data:/app/data           # users.json, invites.json
      - ./certs:/app/certs         # TLS cert + key (created by setup wizard)
      - ./prisma:/app/prisma       # SQLite database (dev.db created by setup wizard)
    env_file:
      - path: .env.local           # Created by setup wizard — never committed to git
        required: false            # OK to be missing on first run before setup
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1   # opt out of Next.js anonymous usage telemetry
    restart: unless-stopped        # Survives reboots; stops cleanly on `docker compose down`
    healthcheck:
      # Try HTTPS first (normal mode), fall back to HTTP (no-certs mode).
      # start_period gives Next.js time to initialise on slow hardware before retries begin.
      test: ["CMD", "sh", "-c", "wget -qO- --no-check-certificate https://localhost:3000/api/auth/config 2>/dev/null || wget -qO- http://localhost:3000/api/auth/config 2>/dev/null"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s
